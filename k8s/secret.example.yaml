# ⚠️ 占位示例 —— 不要把真实值提交到仓库(本仓库是 public)。
# 实际部署请用带外命令创建真实 Secret(见 docs/runbook.md 第 5 步):
#
#   kubectl -n hermes create secret generic hermes-secrets \
#     --from-literal=GEMINI_API_KEY='...' \
#     --from-literal=GOOGLE_API_KEY='...' \
#     --from-literal=TELEGRAM_BOT_TOKEN='...' \
#     --from-literal=TELEGRAM_ALLOWED_USERS='...'
#
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
type: Opaque
stringData:
  GEMINI_API_KEY: "REPLACE_ME"
  GOOGLE_API_KEY: "REPLACE_ME"
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  TELEGRAM_ALLOWED_USERS: "REPLACE_ME"
